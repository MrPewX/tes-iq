<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI IQ Solver - Solve Matrices Instantly</title>
    <meta name="description" content="Aplikasi AI canggih untuk membantu memecahkan pola tes IQ secara real-time.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-square-root-variable"></i>
                <h1>MATH<span>AI</span> PRO</h1>
            </div>
            <p>Arahkan kamera ke soal Matematika Anda.</p>
        </header>

        <section class="camera-section">
            <div class="video-wrapper">
                <video id="camera-feed" autoplay playsinline webkit-playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
                <div class="scan-overlay">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                    <div class="math-symbols-floating">
                        <span>∫</span><span>Σ</span><span>π</span><span>√</span>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button id="capture-btn" class="main-btn" title="Solve Math Problem">
                    <span class="btn-icon"><i class="fas fa-calculator"></i></span>
                    <span class="btn-text">SOLVE MATH</span>
                </button>
            </div>
        </section>

        <section id="result-panel" class="result-panel hidden">
            <div class="panel-header">
                <h3><i class="fas fa-microchip"></i> Math Engine Results</h3>
                <button id="close-result" class="close-btn">&times;</button>
            </div>
            <div class="panel-content">
                <div class="loading-state hidden">
                    <div class="loader"></div>
                    <p>Menganalisis rumus & menghitung...</p>
                </div>
                <div class="data-state">
                    <div class="answer-card">
                        <span class="label">HASIL AKHIR</span>
                        <h2 id="recommended-answer">?</h2>
                    </div>
                    <div class="reasoning-card">
                        <span class="label">Langkah Penyelesaian</span>
                        <div id="pattern-reasoning" style="text-align: left; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px;">Menunggu hasil...</div>
                    </div>
                </div>
            </div>
        </section>

        <canvas id="capture-canvas" style="display:none;"></canvas>
    </main>

    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
