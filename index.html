<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX SCANNER PRO - Pure Algorithm</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="app-container">
        <section class="category-panel">
            <label class="label">PILIH OPERASI MATRIKS:</label>
            <select id="matrix-operation" class="glass-select">
                <option value="determinant">Determinant</option>
                <option value="inverse">Inverse Matrix</option>
                <option value="multiplication">Matrix Multiplication (2x Matrices)</option>
                <option value="gauss-jordan">Gauss-Jordan Elimination</option>
                <option value="cramer">Cramer's Rule</option>
                <option value="rank">Matrix Rank</option>
                <option value="transpose">Matrix Transpose</option>
                <option value="addition">Matrix Addition/Subtraction</option>
            </select>
        </section>

        <section class="camera-section">
            <div class="video-wrapper">
                <video id="camera-feed" autoplay playsinline webkit-playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
                <div class="scan-overlay">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                    <div class="scanning-line"></div>
                </div>
            </div>
            <p class="hint">Arahkan kamera tepat ke kotak matriks di kertas/layar.</p>
        </section>

        <div class="controls">
            <button id="capture-btn" class="main-btn">
                <span class="btn-icon"><i class="fas fa-expand"></i></span>
                <span class="btn-text">SCAN & SOLVE MATRIX</span>
            </button>
        </div>

        <section id="result-panel" class="result-panel hidden">
            <div class="panel-header">
                <h3><i class="fas fa-barcode"></i> Matriks Terdeteksi</h3>
                <button id="close-result" class="close-btn">&times;</button>
            </div>
            <div class="panel-content">
                <div class="loading-state hidden">
                    <div class="loader"></div>
                    <p id="loading-text">Sedang memproses...</p>
                </div>
                <div class="data-state">
                    <div class="answer-card">
                        <span class="label">ANALISIS MATRIKS</span>
                        <div id="detected-matrix-view" class="matrix-view"></div>
                    </div>
                    <div class="answer-card accent">
                        <span class="label">HASIL AKHIR</span>
                        <h2 id="recommended-answer">?</h2>
                    </div>
                    <div class="reasoning-card">
                        <span class="label">Langkah Penyelesaian (Algoritma)</span>
                        <div id="pattern-reasoning" class="steps-view"></div>
                    </div>
                </div>
            </div>
        </section>

        <canvas id="capture-canvas" style="display:none;"></canvas>
    </main>

    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
